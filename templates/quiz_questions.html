{% extends 'base.html' %}{% block content %}<h1>คำถาม: {{quiz.title}}</h1><form method="post"><label>คำถาม</label><textarea name="question_text" required></textarea><label>ชนิด</label><select name="question_type"><option value="choice">ตัวเลือก</option><option value="truefalse">ถูก/ผิด</option><option value="short">เติมคำ</option></select><label>ตัวเลือก ข้อละ 1 บรรทัด</label><textarea name="choices"></textarea><label>คำตอบที่ถูก</label><input name="correct_answer"><label>คะแนน</label><input name="score" type="number" step="0.5" value="1"><button>เพิ่มคำถาม</button></form><table><tr><th>คำถาม</th><th>คำตอบ</th><th>จัดการ</th></tr>{% for q in questions %}<tr><td>{{q.question_text}}</td><td>{{q.correct_answer}}</td><td><a class="btn small" href="{{url_for('quiz_question_edit', question_id=q.id)}}">แก้ไข</a><form method="post" action="{{url_for('quiz_question_delete', question_id=q.id)}}" class="inline" onsubmit="return confirm('ลบข้อสอบนี้?')"><button class="danger-btn small">ลบ</button></form></td></tr>{% endfor %}</table>{% endblock %}
