{% extends 'base.html' %}{% block content %}<h1>แก้ไขข้อสอบ</h1><form method="post"><label>คำถาม</label><textarea name="question_text" required>{{q.question_text}}</textarea><label>ชนิด</label><select name="question_type">{% for t,n in [('choice','ตัวเลือก'),('truefalse','ถูก/ผิด'),('short','เติมคำ')] %}<option value="{{t}}" {% if q.question_type==t %}selected{% endif %}>{{n}}</option>{% endfor %}</select><label>ตัวเลือก ข้อละ 1 บรรทัด</label><textarea name="choices">{{q.choices}}</textarea><label>คำตอบที่ถูก</label><input name="correct_answer" value="{{q.correct_answer}}"><label>คะแนน</label><input name="score" type="number" step="0.5" value="{{q.score}}"><button>บันทึก</button><a class="btn secondary" href="{{url_for('quiz_questions', quiz_id=quiz.id)}}">กลับ</a></form>{% endblock %}
