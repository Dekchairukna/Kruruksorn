{% extends 'base.html' %}{% block content %}<h1>แก้ไขผู้ใช้</h1><form method="post"><label>ชื่อ-สกุล</label><input name="full_name" value="{{u.full_name}}" required><label>Username</label><input name="username" value="{{u.username}}" required><label>รหัสผ่านใหม่ (เว้นว่างถ้าไม่เปลี่ยน)</label><input name="password"><label>บทบาท</label><select name="role">{% for r in ['admin','teacher','student'] %}<option value="{{r}}" {% if u.role==r %}selected{% endif %}>{{r}}</option>{% endfor %}</select><button>บันทึก</button><a class="btn secondary" href="{{url_for('users')}}">กลับ</a></form>{% endblock %}
