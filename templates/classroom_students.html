{% extends 'base.html' %}{% block content %}<h1>นักเรียนในห้อง {{room.name}}</h1><form method="post" class="form-row"><select name="student_id">{% for s in students %}<option value="{{s.id}}">{{s.full_name}}</option>{% endfor %}</select><button>เพิ่มนักเรียน</button></form><table><tr><th>ชื่อ</th><th>username</th><th>จัดการ</th></tr>{% for l in links %}<tr><td>{{l.student.full_name}}</td><td>{{l.student.username}}</td><td><form method="post" action="{{url_for('classroom_student_delete', link_id=l.id)}}" class="inline" onsubmit="return confirm('นำนักเรียนออกจากห้อง?')"><button class="danger-btn small">ลบ</button></form></td></tr>{% endfor %}</table>{% endblock %}
