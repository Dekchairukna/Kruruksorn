{% extends 'base.html' %}
{% block content %}
{% if not current_user.is_authenticated %}<style>.main{margin-left:0!important;max-width:1100px;margin:auto!important}.sidebar-collapse-btn{display:none!important}</style>{% endif %}
<div class="page-head"><div><h1>แก้ไขข้อมูลผลงาน/เอกสาร</h1><p>แก้ข้อมูลที่ OCR อ่านผิดได้ทุกช่อง</p></div><a class="btn secondary" href="{{ url_for('teacher_portfolio_detail', doc_id=doc.id) }}">← กลับ</a></div>
<div class="card">
  <form method="post">
    <div class="grid-form">
      <label>เรื่อง/หัวข้อ <input name="title" value="{{ doc.title or '' }}"></label>
      <label>เลขที่เอกสาร <input name="doc_number" value="{{ doc.doc_number or '' }}"></label>
      <label>วันที่ <input name="doc_date" value="{{ doc.doc_date or '' }}"></label>
      <label>ประเภท <select name="category">{% for c in categories %}<option value="{{ c }}" {% if doc.category==c %}selected{% endif %}>{{ c }}</option>{% endfor %}</select></label>
    </div>
    <div class="grid-form">
      <label>หน่วยงาน <input name="organization" value="{{ doc.organization or '' }}"></label>
      <label>เจ้าของผลงาน <input name="owner_name" value="{{ doc.owner_name or '' }}" list="teacherList"><datalist id="teacherList">{% for t in teachers %}<option value="{{ t.full_name }}">{% endfor %}</datalist></label>
      <label>หน้าที่ในเอกสาร <input name="owner_role" value="{{ doc.owner_role or '' }}"></label>
    </div>
    <label>แท็ก <input name="tags" value="{{ doc.tags or '' }}"></label>
    <label>สรุป <textarea name="summary" rows="4">{{ doc.summary or '' }}</textarea></label>
    <label>ข้อความ OCR ที่ระบบอ่านได้ <textarea name="extracted_text" rows="12">{{ doc.extracted_text or '' }}</textarea></label>
    <div class="action-row"><button>บันทึก</button><a class="btn secondary" href="{{ url_for('teacher_portfolio_detail', doc_id=doc.id) }}">ยกเลิก</a></div>
  </form>
</div>
{% endblock %}
