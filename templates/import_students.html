{% extends 'base.html' %}{% block content %}<h1>นำเข้านักเรียนจาก Excel</h1><div class="card"><p>รูปแบบคอลัมน์: เลขบัตรประชาชน | ชื่อ-สกุล | วันเกิด</p><p>Username = เลขบัตร, Password = วันเดือนปีเกิด</p></div><form method="post" enctype="multipart/form-data"><label>เลือกห้องเรียน</label><select name="classroom_id" required>{% for r in rooms %}<option value="{{r.id}}">{{r.name}}</option>{% endfor %}</select><label>ไฟล์ Excel</label><input type="file" name="excel" accept=".xlsx" required><button>นำเข้า</button></form>{% endblock %}
