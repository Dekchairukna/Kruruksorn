{% extends 'base.html' %}{% block content %}<h1>{{'แก้ไขงานที่สั่ง' if assignment else 'สั่งงาน'}}</h1><form method="post"><label>ชื่องาน</label><input name="title" value="{{assignment.title if assignment else ''}}" required><label>รายวิชา</label><select name="subject_id">{% for s in subjects %}<option value="{{s.id}}" {% if assignment and assignment.subject_id==s.id %}selected{% endif %}>{{s.name}}</option>{% endfor %}</select><label>ห้องเรียน</label><select name="classroom_id">{% for r in rooms %}<option value="{{r.id}}" {% if assignment and assignment.classroom_id==r.id %}selected{% endif %}>{{r.name}}</option>{% endfor %}</select><label>บทเรียน</label><select name="lesson_id">{% for l in lessons %}<option value="{{l.id}}" {% if assignment and assignment.lesson_id==l.id %}selected{% endif %}>{{l.unit.subject.name}} / {{l.title}}</option>{% endfor %}</select><label>กำหนดส่ง</label><input name="due_date" type="date" value="{{assignment.due_date if assignment and assignment.due_date else ''}}"><button>{{'บันทึกแก้ไข' if assignment else 'สั่งงานให้นักเรียนในห้อง'}}</button></form>{% endblock %}
