{% extends 'base.html' %}{% block content %}<h1>งานที่สั่งแล้ว</h1><p><a class="btn" href="{{url_for('assign')}}">+ สั่งงานใหม่</a></p><table><tr><th>งาน</th><th>วิชา</th><th>ห้อง</th><th>บทเรียน</th><th>กำหนดส่ง</th><th>จัดการ</th></tr>{% for a in assignments %}<tr><td>{{a.title}}</td><td>{{a.subject.name}}</td><td>{{a.classroom.name}}</td><td>{{a.lesson.title}}</td><td>{{a.due_date or '-'}}</td><td><a class="btn small" href="{{url_for('assignment_edit', assignment_id=a.id)}}">แก้ไข</a><form method="post" action="{{url_for('assignment_delete', assignment_id=a.id)}}" class="inline" onsubmit="return confirm('ลบงานนี้?')"><button class="danger-btn small">ลบ</button></form></td></tr>{% endfor %}</table>{% endblock %}
